# Server Port (API Gateway)
server.port=8080

# In Docker, backend.url can be overridden by environment variable BACKEND_URL   
backend.url=http://localhost:8081/api/


# Spring Application Name
spring.application.name=api-gateway

# Gateway Route Configuration
# NOTE: Custom routing implemented in GatewayController
# API keys defined in ApiKeyConfig (dev-key-alpha, dev-key-beta)

# Limit requests to a maximum of 3 within 10 seconds
abuse.spike.maxRequestsPerWindow=3
abuse.spike.windowSeconds=10

# Limit IP to 5 failures within 60 seconds and then ban it
abuse.failure.maxFailuresPerWindow=5
abuse.failure.windowSeconds=60