# Test overrides — tighter limits so tests don't need 30+ requests
# The @DynamicPropertySource in the test will override spring.data.redis.host 
# and port at runtime to point at the Testcontainers Redis, 
# so those two lines in the test properties don't matter. They're just fallback defaults.

spring.data.redis.host=localhost
spring.data.redis.port=6379

rate-limit.default-limit=5
rate-limit.default-algorithm=token

rate-limit.tenants.tenant-acme.limit=3
rate-limit.tenants.tenant-acme.algorithm=token
rate-limit.tenants.tenant-acme.enabled=true
rate-limit.tenants.tenant-acme.apps.dashboard.limit=2
rate-limit.tenants.tenant-acme.apps.dashboard.enabled=true

rate-limit.tenants.tenant-beta.enabled=false

# TTLs
rate-limit.redis.token.ttl-seconds=60
rate-limit.redis.fixed.ttl-seconds=10
rate-limit.redis.sliding.ttl-seconds=60

abuse.failure.maxFailuresPerWindow=50
abuse.failure.windowSeconds=60
